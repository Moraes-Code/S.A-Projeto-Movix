<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Movix - Cadastro</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>

  <!-- Logo -->
  <div class="logo">
    M
    <span>movix</span>
  </div>

  <!-- Card -->
  <div class="card-cadastro">

    <div class="titulo">Cadastro</div>

    <form id="formCadastro">

      <div class="mb-3">
        <label>Nome:</label>
        <input type="text" id="nome" class="form-control" placeholder="Seu nome">
      </div>

      <div class="mb-3">
        <label>E-mail:</label>
        <input type="email" id="email" class="form-control" placeholder="E-mail">
      </div>

      <div class="mb-3">
        <label>Senha:</label>
        <input type="password" id="senha" class="form-control" placeholder="Senha">
      </div>

      <div class="mb-3">
        <label>Confirmar Senha:</label>
        <input type="password" id="confirmarSenha" class="form-control" placeholder="Confirme a senha">
      </div>

      <button type="submit" class="btn btn-success w-100 btn-cadastrar">
        Cadastrar
      </button>

      <div class="link-login">
        <a href="../index.html">Já tem conta? Fazer login</a>
      </div>

    </form>

  </div>

  <!-- JS externo -->
  <script src="../js/cadastro.js"></script>

</body>
</html>
