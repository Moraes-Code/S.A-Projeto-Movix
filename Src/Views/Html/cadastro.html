<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Movix</title>

    <link rel="stylesheet" href="../Css/login.css">

</head>

<body>

    <div class="container">

        <div class="left">

            <div class="logo">

              <img src="../Css/Imgs/Logo-Movix__1_-removebg-preview.png" alt="Logo Movix">

            </div>

            <div class="texto">

                <h2>
                    Gerencie sua malha ferroviária da melhor forma
                </h2>

                <p>
                    Plataforma de diversas operações e dados em tempo real.
                </p>

            </div>

        </div>

        <div class="right">

            <div class="login-box">

                <h1>Crie sua conta</h1>

                <p>
                    Preencha seus dados para começar a usar o Movix
                </p>

        <form id="formLogin">

        <label>Nome Completo</label>

            <input
            type="text"
            id="nome"
            placeholder="Ex: mínimo 6 caracteres"
            required>

            <label>E-mail</label>

            <input
            type="email"
            id="email"
            placeholder="Ex: joao@gmail.com"
            required>

            <label>Senha</label>

            <input
            type="password"
            id="senha"
            placeholder="******"
            required>

            <button type="submit" class="btn">
             Criar Conta
            </button>

        </form>

                <div class="cadastro">
                    Ja tem conta ?
                    <a href="login.html">
                        Login
                    </a>

                </div>

            </div>

        </div>

    </div>

    <script src="../Js/cadastro.js"></script>

</body>

</html>
