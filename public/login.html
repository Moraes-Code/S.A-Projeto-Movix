<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Movix</title>

    <link rel="stylesheet" href="../assets/style/style.css">

    </head>

<body>

    <header class="header">
        <img src="../Css/Imgs/Logo-Movix__1_-removebg-preview.png" alt="Logo Movix">
    </header>

    <div class="hero">

        <h1>Bem-vindo</h1>

        <p>
            Entre com suas credenciais para acessar o painel.
        </p>

        <form id="formLogin">

            <p>E-mail</p>

               <input
                type="email"
                id="email"
                placeholder="Ex: joao@gmail.com"
                required>

            <br><br>

            <p>Senha</p>

            <input
                type="password"
                id="senha"
                placeholder="******"
                required>


                   <br><br>

            <button class="btn" onclick="entrar()">
                Entrar
            </button>

        </form>

        <br>

        <p>
            Não tem conta?
            <a href="cadastro.html">
                Cadastre-se
            </a>
        </p>

    </div>

    <script src="../Js/login.js"></script>

</body>

</html>
