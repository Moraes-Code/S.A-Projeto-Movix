<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Movix</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/style/style.css">

</head>

<body class="login-page">

    <div class="container">

        <div class="row min-vh-100 align-items-center">

            <!-- Lado esquerdo -->

            <div class="col-lg-6">

                <div class="pe-lg-5">

                    <img src="../assets/imgs/logo_movix_semfundoazul.png"
                         class="login-logo mb-4"
                         alt="Movix">

                    <h1 class="login-title">
                        Gestão ferroviária inteligente.
                    </h1>

                    <p class="login-text mt-3">
                        Monitore sensores, gerencie usuários,
                        acompanhe trens e receba alertas em
                        tempo real através da plataforma MOVIX.
                    </p>

                </div>

            </div>

            <!-- Lado direito -->

            <div class="col-lg-5 offset-lg-1">

                <div class="login-card">

                    <h2 class="text-center mb-4">
                        Entrar
                    </h2>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                E-mail
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Digite seu e-mail">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Senha
                            </label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Digite sua senha">

                        </div>

                        <button type="submit"
                                class="btn btn-movix w-100">

                            Entrar

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <p class="mb-2">
                            Ainda não possui uma conta?
                        </p>

                        <a href="cadastro.html"
                           class="btn btn-outline-movix">

                            Cadastrar Agora

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
