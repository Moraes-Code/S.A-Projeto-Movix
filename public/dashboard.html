<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Movix</title>


<link rel="stylesheet" href="../assets/style/style.css">


</head>
<body>


<header class="header">
    <img src="../assets/imgs/logo_movix_semfundoazul.png" alt="Logo Movix">
</header>

<div class="principal">

    <h1>Painel do Administrador</h1>

    <p>
        Bem-vindo ao sistema Movix.
    </p>

    <p>
        Administrador: Bruno Moraes
    </p>

    <button class="btn" onclick="location.href='sensores.html'">
        Cadastro de Sensores
    </button>

    <br><br>

    <button class="btn" onclick="location.href='trens.html'">
        Cadastro de Trens
    </button>

    <br><br>

    <button class="btn" onclick="location.href='login.html'">
        Sair do Sistema
    </button>

    <br><br><br>

    <h2>Sensores Cadastrados</h2>

    <table class="tabela">

        <tr>
            <th>ID</th>
            <th>Localização</th>
            <th>Tipo</th>
            <th>Excluir</th>
            <th>Detalhes</th>
        </tr>

        <tr>
            <td>001</td>
            <td>Estação Central</td>
            <td>Temperatura</td>

            <td>
                <button class="btn">
                    Excluir
                </button>
            </td>

            <td>
                <button class="btn">
                    Ver
                </button>
            </td>
        </tr>

        <tr>
            <td>002</td>
            <td>Ponte Norte</td>
            <td>Velocidade</td>

            <td>
                <button class="btn">
                    Excluir
                </button>
            </td>

            <td>
                <button class="btn">
                    Ver
                </button>
            </td>
        </tr>

        <tr>
            <td>003</td>
            <td>Túnel Sul</td>
            <td>Falha</td>

            <td>
                <button class="btn">
                    Excluir
                </button>
            </td>

            <td>
                <button class="btn">
                    Ver
                </button>
            </td>
        </tr>

    </table>

</div>

<script src="../scripts/index.js"></script>


</body>
</html>
