<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Movix</title>
    <link rel="stylesheet" href="../assets/style/style.css">
</head>
<body>
    <header class="header">
        <img src="../assets/imgs/logo_movix_semfundoazul.png" alt="Logo Movix">
    </header>

    <div class="principal">
        <h1>Olá, Administrador</h1>
        
        <br>
        <a href="sensores.html"><button class="btn">Cadastrar Sensores e Trens</button></a>
        <br><br>

        <h2>Lista de Sensores</h2>
        
        <p>
            ID: 01 | Local: KM 42 | Dado: Velocidade 
            <button class="btn" onclick="alert('Visualizando detalhes do Sensor 01')">Detalhes</button>
            <button class="btn" onclick="excluirSensor(1)">Excluir</button>
        </p>

        <p>
            ID: 02 | Local: KM 80 | Dado: Temperatura 
            <button class="btn" onclick="alert('Visualizando detalhes do Sensor 02')">Detalhes</button>
            <button class="btn" onclick="excluirSensor(2)">Excluir</button>
        </p>

        <p>
            ID: 03 | Local: KM 105 | Dado: Falha 
            <button class="btn" onclick="alert('Visualizando detalhes do Sensor 03')">Detalhes</button>
            <button class="btn" onclick="excluirSensor(3)">Excluir</button>
        </p>
        <br><br>

        <button class="btn" onclick="fazerLogout()">Sair do Sistema</button>
    </div>

    <script src="../scripts/index.js"></script>
</body>
</html>
